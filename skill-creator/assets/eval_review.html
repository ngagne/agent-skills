<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eval Set Review - __SKILL_NAME_PLACEHOLDER__</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --canvas: #f1f0ea;
      --surface: #faf9f4;
      --paper: #ffffff;
      --cardstock: #efeee9;
      --ink: #1b1c19;
      --ink-muted: #434655;
      --outline: #c3c6d7;
      --outline-strong: #737686;
      --primary: #004ac6;
      --primary-strong: #2563eb;
      --primary-soft: #dbe1ff;
      --primary-soft-strong: #b4c5ff;
      --secondary: #b61722;
      --secondary-soft: #ffdad7;
      --secondary-soft-strong: #ffb3ad;
      --shadow-paper: 0 2px 4px rgba(0, 0, 0, 0.08);
      --shadow-lifted: 0 8px 16px rgba(0, 0, 0, 0.12);
      --radius: 4px;
      --page-width: 1200px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Fira Sans', sans-serif;
      background: var(--canvas);
      color: var(--ink);
      padding: 32px 40px;
    }

    .page {
      width: min(100%, var(--page-width));
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .page-header,
    .table-card {
      background: var(--paper);
      border: 1px solid var(--outline);
      border-radius: var(--radius);
      box-shadow: var(--shadow-paper);
    }

    .page-header {
      padding: 24px 28px;
    }

    .eyebrow,
    th,
    .section-header td {
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .eyebrow {
      margin-bottom: 12px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }

    .header-copy {
      flex: 1 1 700px;
    }

    h1 {
      font-size: clamp(1.5rem, 2.6vw, 2rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .description {
      margin-top: 12px;
      max-width: 780px;
      color: var(--ink-muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: 320px;
      margin-left: auto;
    }

    .summary-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border: 1px solid var(--outline);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink-muted);
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: 0.05em;
    }

    .summary-chip-trigger {
      background: var(--primary-soft);
      border-color: var(--primary-soft-strong);
      color: var(--primary);
    }

    .summary-chip-no-trigger {
      background: var(--secondary-soft);
      border-color: var(--secondary-soft-strong);
      color: var(--secondary);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .btn,
    .btn-delete {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border: 1px solid var(--outline-strong);
      border-radius: var(--radius);
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
      font-family: 'Fira Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      text-decoration: none;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .btn:hover,
    .btn-delete:hover {
      background: var(--surface);
      box-shadow: var(--shadow-lifted);
      transform: translateY(-1px);
    }

    .btn-add {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--paper);
    }

    .btn-add:hover {
      background: var(--primary-strong);
      border-color: var(--primary-strong);
    }

    .btn-export:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-delete {
      padding: 8px 12px;
      color: var(--secondary);
    }

    .btn-delete:hover {
      background: var(--secondary-soft);
      border-color: var(--secondary);
      color: var(--secondary);
    }

    .table-card {
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--paper);
    }

    th {
      padding: 14px 16px;
      text-align: left;
      background: var(--cardstock);
      border-right: 1px solid var(--outline);
      border-bottom: 1px solid var(--outline);
    }

    thead th:last-child,
    tbody td:last-child {
      border-right: none;
    }

    td {
      padding: 16px;
      border-right: 1px solid var(--outline);
      border-bottom: 1px solid var(--outline);
      vertical-align: top;
      background: var(--paper);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .query-row:hover td {
      background: #fcfbf8;
    }

    .section-header td {
      padding: 12px 16px;
      background: var(--surface);
    }

    .query-input {
      width: 100%;
      min-height: 72px;
      padding: 12px 14px;
      border: 1px solid var(--outline);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
    }

    .query-input:focus {
      outline: 2px solid var(--primary);
      outline-offset: 0;
      border-color: var(--primary);
      box-shadow: none;
    }

    .trigger-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      position: relative;
      cursor: pointer;
    }

    .trigger-checkbox {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .trigger-mark {
      width: 16px;
      height: 16px;
      border: 1px solid var(--outline-strong);
      border-radius: 2px;
      background: var(--paper);
      position: relative;
      flex-shrink: 0;
    }

    .trigger-checkbox:checked + .trigger-mark {
      background: var(--primary-soft);
      border-color: var(--primary);
    }

    .trigger-checkbox:checked + .trigger-mark::before,
    .trigger-checkbox:checked + .trigger-mark::after {
      content: "";
      position: absolute;
      top: 6px;
      left: 1px;
      width: 12px;
      height: 2.5px;
      background: var(--primary);
      border-radius: 1px;
    }

    .trigger-checkbox:checked + .trigger-mark::before {
      transform: rotate(45deg);
    }

    .trigger-checkbox:checked + .trigger-mark::after {
      transform: rotate(-45deg);
    }

    .trigger-text {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    @media (max-width: 900px) {
      body {
        padding: 24px 16px;
      }

      .header-row {
        flex-direction: column;
      }

      .summary {
        justify-content: flex-start;
        margin-left: 0;
        max-width: none;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .page-header {
        padding: 20px 16px;
      }

      th,
      td {
        padding: 12px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div class="eyebrow">Eval Set Editor</div>
      <div class="header-row">
        <div class="header-copy">
          <h1>Eval Set Review: <span id="skill-name">__SKILL_NAME_PLACEHOLDER__</span></h1>
          <p class="description">Current description: <span id="skill-desc">__SKILL_DESCRIPTION_PLACEHOLDER__</span></p>
        </div>
        <div class="summary" id="summary"></div>
      </div>

      <div class="controls">
        <button class="btn btn-add" onclick="addRow()">+ Add Query</button>
        <button class="btn btn-export" onclick="exportEvalSet()">Export Eval Set</button>
      </div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th style="width:65%">Query</th>
            <th style="width:20%">Should Trigger</th>
            <th style="width:15%">Actions</th>
          </tr>
        </thead>
        <tbody id="eval-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    const EVAL_DATA = __EVAL_DATA_PLACEHOLDER__;

    let evalItems = [...EVAL_DATA];

    function render() {
      const tbody = document.getElementById("eval-body");
      tbody.innerHTML = "";

      const sorted = evalItems
        .map((item, origIdx) => ({ ...item, origIdx }))
        .sort((a, b) => (b.should_trigger ? 1 : 0) - (a.should_trigger ? 1 : 0));

      let lastGroup = null;
      sorted.forEach((item) => {
        const group = item.should_trigger ? "trigger" : "no-trigger";
        if (group !== lastGroup) {
          const headerRow = document.createElement("tr");
          headerRow.className = "section-header";
          headerRow.innerHTML = `<td colspan="3">${item.should_trigger ? "Should Trigger" : "Should NOT Trigger"}</td>`;
          tbody.appendChild(headerRow);
          lastGroup = group;
        }

        const idx = item.origIdx;
        const tr = document.createElement("tr");
        tr.className = "query-row";
        tr.innerHTML = `
          <td><textarea class="query-input" aria-label="Query ${idx + 1}" onchange="updateQuery(${idx}, this.value)">${escapeHtml(item.query)}</textarea></td>
          <td>
            <label class="trigger-toggle">
              <input class="trigger-checkbox" type="checkbox" aria-label="Should trigger for query ${idx + 1}" ${item.should_trigger ? "checked" : ""} onchange="updateTrigger(${idx}, this.checked)">
              <span class="trigger-mark"></span>
              <span class="trigger-text">${item.should_trigger ? "Included" : "Excluded"}</span>
            </label>
          </td>
          <td><button class="btn-delete" onclick="deleteRow(${idx})">Delete</button></td>
        `;
        tbody.appendChild(tr);
      });

      updateSummary();
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function updateQuery(idx, value) {
      evalItems[idx].query = value;
      updateSummary();
    }

    function updateTrigger(idx, value) {
      evalItems[idx].should_trigger = value;
      render();
    }

    function deleteRow(idx) {
      evalItems.splice(idx, 1);
      render();
    }

    function addRow() {
      evalItems.push({ query: "", should_trigger: true });
      render();
      const inputs = document.querySelectorAll(".query-input");
      inputs[inputs.length - 1].focus();
    }

    function updateSummary() {
      const trigger = evalItems.filter((item) => item.should_trigger).length;
      const noTrigger = evalItems.filter((item) => !item.should_trigger).length;
      document.getElementById("summary").innerHTML =
        `<span class="summary-chip">${evalItems.length} total</span>` +
        `<span class="summary-chip summary-chip-trigger">${trigger} should trigger</span>` +
        `<span class="summary-chip summary-chip-no-trigger">${noTrigger} should not trigger</span>`;
    }

    function exportEvalSet() {
      const valid = evalItems.filter((item) => item.query.trim() !== "");
      const data = valid.map((item) => ({ query: item.query.trim(), should_trigger: item.should_trigger }));
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "eval_set.json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    render();
  </script>
</body>
</html>
